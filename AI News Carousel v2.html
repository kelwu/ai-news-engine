<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product by Kel — AI News Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#F2F1ED"/>
    <rect x="10" y="10" width="80" height="28" rx="3" fill="#162535"/>
    <rect x="18" y="18" width="30" height="6" rx="2" fill="#3B9EFF" opacity="0.8"/>
    <rect x="18" y="28" width="55" height="4" rx="1" fill="#fff"/>
    <rect x="10" y="44" width="38" height="24" rx="3" fill="#e8e7e3"/>
    <rect x="52" y="44" width="38" height="24" rx="3" fill="#e8e7e3"/>
    <rect x="18" y="50" width="20" height="3" rx="1" fill="#3B9EFF"/>
    <rect x="18" y="56" width="24" height="3" rx="1" fill="#162535" opacity="0.4"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #111a21;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
#tweaks-panel {
  display: none;
  position: fixed; bottom: 24px; right: 24px;
  background: #1a2b37; border: 1px solid #2a3f52;
  border-radius: 16px; padding: 20px; width: 240px;
  z-index: 9999; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  color: #fff; font-family: 'DM Sans', sans-serif;
}
#tweaks-panel.visible { display: block; }
#tweaks-panel h3 { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #3B9EFF; margin-bottom: 14px; }
.tweak-label { font-size: 11px; color: #6a8fa8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
.theme-btns { display: flex; gap: 6px; margin-bottom: 16px; }
.theme-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px; border: 2px solid transparent;
  font-size: 11px; font-weight: 700; cursor: pointer; text-align: center;
  transition: all 0.2s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em;
}
.theme-btn.active { border-color: #3B9EFF !important; }
.theme-btn.light { background: #F2F1ED; color: #162535; }
.theme-btn.dark { background: #162535; color: #F2F1ED; border-color: #2a3f52; }
.theme-btn.mixed { background: linear-gradient(135deg, #162535 50%, #F2F1ED 50%); color: #fff; border-color: #2a3f52; }
.tweak-divider { border: none; border-top: 1px solid #2a3f52; margin: 14px 0; }
.reload-btn {
  width: 100%; padding: 10px; border-radius: 8px; border: none;
  background: #3B9EFF; color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s;
  letter-spacing: 0.02em;
}
.reload-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-label">Color Theme</div>
  <div class="theme-btns">
    <button class="theme-btn light" data-theme="light">Light</button>
    <button class="theme-btn dark" data-theme="dark">Dark</button>
    <button class="theme-btn mixed" data-theme="mixed">Mixed</button>
  </div>
  <hr class="tweak-divider">
  <div class="tweak-label">Content</div>
  <button class="reload-btn" id="reload-btn">↻ Regenerate</button>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const NAVY  = '#162535';
const BLUE  = '#3B9EFF';
const CREAM = '#F2F1ED';
const CARD_L = '#E8E7E3'; // slightly darker cream for cards on light bg
const CARD_D = '#1f3244'; // lighter navy for cards on dark bg

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light"
}/*EDITMODE-END*/;

// ─── PbK Logo SVG ─────────────────────────────────────────────────
function PbkLogo({ height = 28, onLight = true }) {
  const c = onLight ? NAVY : '#fff';
  return (
    <svg height={height} viewBox="0 0 260 80" fill="none" xmlns="http://www.w3.org/2000/svg" style={{display:'block'}}>
      <rect x="2" y="24" width="42" height="42" rx="4" stroke={c} strokeWidth="7" fill="none"/>
      <circle cx="27" cy="9" r="7" fill={BLUE}/>
      <line x1="27" y1="15" x2="19" y2="24" stroke={BLUE} strokeWidth="5" strokeLinecap="round"/>
      <text x="58" y="47" fontFamily="DM Sans,sans-serif" fontWeight="700" fontSize="34" fill={c} letterSpacing="-1">PRODUCT</text>
      <text x="58" y="78" fontFamily="DM Sans,sans-serif" fontWeight="700" fontSize="34" fill={c} letterSpacing="-1">BY KEL</text>
    </svg>
  );
}

// ─── Category Pill ────────────────────────────────────────────────
function CategoryPill({ label, onLight }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      background: onLight ? NAVY : 'rgba(59,158,255,0.15)',
      border: onLight ? 'none' : '1px solid rgba(59,158,255,0.35)',
      borderRadius: 100, padding: '8px 18px', alignSelf: 'flex-start'
    }}>
      <div style={{ width: 6, height: 6, borderRadius: '50%', background: BLUE, flexShrink: 0 }} />
      <span style={{
        color: onLight ? '#fff' : BLUE,
        fontSize: 13, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase'
      }}>{label}</span>
    </div>
  );
}

// ─── Slide 1: Cover ───────────────────────────────────────────────
function CoverSlide({ data, onLight }) {
  const bg   = onLight ? CREAM : NAVY;
  const text = onLight ? NAVY  : '#fff';
  const sub  = onLight ? 'rgba(22,37,53,0.45)' : 'rgba(255,255,255,0.4)';

  return (
    <div style={{ width:'100%', height:'100%', background:bg, display:'flex', flexDirection:'column', padding:'60px 64px', position:'relative', overflow:'hidden' }}>
      {/* Top accent stripe */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:5, background:`linear-gradient(90deg, ${BLUE} 0%, transparent 80%)` }}/>

      {/* Logo row */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'auto' }}>
        <PbkLogo height={30} onLight={onLight} />
        <span style={{ color:sub, fontSize:15 }}>{data?.date || 'April 22, 2026'}</span>
      </div>

      {/* Main content */}
      <div style={{ paddingTop: 48 }}>
        <div style={{ marginBottom: 28 }}>
          <CategoryPill label={data?.category || 'AI News'} onLight={onLight} />
        </div>

        {/* Headline with inline blue highlight */}
        <h1 style={{ color:text, fontSize:72, fontWeight:700, lineHeight:1.04, letterSpacing:'-0.03em', marginBottom:36, textWrap:'pretty' }}>
          {data?.headlinePrefix && <>{data.headlinePrefix} </>}
          {data?.headlineHighlight && <span style={{ color:BLUE }}>{data.headlineHighlight}</span>}
          {data?.headlineSuffix && <> {data.headlineSuffix}</>}
          {!data?.headlinePrefix && (data?.headline || 'Loading…')}
        </h1>

        {/* Quick stats strip */}
        {data?.stats && (
          <div style={{ display:'flex', gap:0, borderTop:`1px solid ${onLight ? 'rgba(22,37,53,0.12)' : 'rgba(255,255,255,0.1)'}`, paddingTop:28 }}>
            {data.stats.slice(0,3).map((s, i) => (
              <div key={i} style={{
                flex:1, paddingRight:24,
                borderRight: i < data.stats.slice(0,3).length - 1 ? `1px solid ${onLight ? 'rgba(22,37,53,0.12)' : 'rgba(255,255,255,0.1)'}` : 'none',
                marginRight: i < data.stats.slice(0,3).length - 1 ? 24 : 0,
              }}>
                <div style={{ color:BLUE, fontSize:36, fontWeight:700, letterSpacing:'-0.02em', lineHeight:1 }}>{s.number}</div>
                <div style={{ color:sub, fontSize:14, marginTop:6, lineHeight:1.3 }}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* Swipe hint */}
        <div style={{ position:'absolute', bottom:48, right:64, display:'flex', alignItems:'center', gap:6, color:sub, fontSize:13 }}>
          Swipe to read
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke={sub} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>
    </div>
  );
}

// ─── Slide 2: What Happened ────────────────────────────────────────
function ContextSlide({ data, onLight, slideNum, total }) {
  const bg   = onLight ? CREAM : NAVY;
  const text = onLight ? NAVY  : '#fff';
  const sub  = onLight ? 'rgba(22,37,53,0.5)' : 'rgba(255,255,255,0.45)';
  const cardBg = onLight ? CARD_L : CARD_D;

  return (
    <div style={{ width:'100%', height:'100%', background:bg, display:'flex', flexDirection:'column', padding:'56px 64px' }}>
      <SlideHeader label="What Happened" slideNum={slideNum} total={total} sub={sub} />

      <p style={{ color:text, fontSize:28, fontWeight:400, lineHeight:1.55, textWrap:'pretty', marginBottom:40, flex:1 }}>
        {data?.context || '…'}
      </p>

      {/* Pull quote card */}
      {data?.contextQuote && (
        <div style={{ background:cardBg, borderRadius:16, padding:'28px 32px', borderLeft:`4px solid ${BLUE}` }}>
          <p style={{ color:text, fontSize:24, fontWeight:600, lineHeight:1.4, fontStyle:'italic' }}>
            "{data.contextQuote}"
          </p>
        </div>
      )}

      <SlideFooter sub={sub} />
    </div>
  );
}

// ─── Slide 3: By The Numbers ──────────────────────────────────────
function StatsSlide({ data, onLight, slideNum, total }) {
  const bg   = onLight ? CREAM : NAVY;
  const text = onLight ? NAVY  : '#fff';
  const sub  = onLight ? 'rgba(22,37,53,0.5)' : 'rgba(255,255,255,0.45)';
  const cardBg = onLight ? CARD_L : CARD_D;

  return (
    <div style={{ width:'100%', height:'100%', background:bg, display:'flex', flexDirection:'column', padding:'56px 64px' }}>
      <SlideHeader label="By The Numbers" slideNum={slideNum} total={total} sub={sub} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:20 }}>
        {(data?.stats || []).map((s, i) => (
          <div key={i} style={{
            flex:1, background:cardBg, borderRadius:16, padding:'32px 36px',
            display:'flex', alignItems:'center', justifyContent:'space-between', gap:24
          }}>
            <div style={{ color:text, fontSize:22, fontWeight:400, lineHeight:1.3, maxWidth:'55%' }}>{s.label}</div>
            <div style={{ color:BLUE, fontSize:64, fontWeight:700, letterSpacing:'-0.03em', lineHeight:1, flexShrink:0 }}>{s.number}</div>
          </div>
        ))}
      </div>

      <SlideFooter sub={sub} />
    </div>
  );
}

// ─── Slide 4: Key Points ──────────────────────────────────────────
function FactsSlide({ data, onLight, slideNum, total }) {
  const bg   = onLight ? CREAM : NAVY;
  const text = onLight ? NAVY  : '#fff';
  const sub  = onLight ? 'rgba(22,37,53,0.5)' : 'rgba(255,255,255,0.45)';
  const cardBg = onLight ? CARD_L : CARD_D;

  return (
    <div style={{ width:'100%', height:'100%', background:bg, display:'flex', flexDirection:'column', padding:'56px 64px' }}>
      <SlideHeader label="Key Points" slideNum={slideNum} total={total} sub={sub} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:18 }}>
        {(data?.facts || ['…','…','…']).map((fact, i) => (
          <div key={i} style={{ flex:1, background:cardBg, borderRadius:16, padding:'28px 32px', display:'flex', gap:24, alignItems:'flex-start' }}>
            <div style={{
              width:38, height:38, borderRadius:'50%', border:`2px solid ${BLUE}`,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
              color:BLUE, fontSize:16, fontWeight:700
            }}>0{i+1}</div>
            <p style={{ color:text, fontSize:22, fontWeight:400, lineHeight:1.45, textWrap:'pretty', paddingTop:6 }}>{fact}</p>
          </div>
        ))}
      </div>

      <SlideFooter sub={sub} />
    </div>
  );
}

// ─── Slide 5: PM Lens ─────────────────────────────────────────────
function PmLensSlide({ data, onLight, slideNum, total }) {
  // This slide always flips to navy for visual contrast regardless of theme
  const bg   = NAVY;
  const text = '#fff';
  const sub  = 'rgba(255,255,255,0.4)';
  const cardBg = CARD_D;

  return (
    <div style={{ width:'100%', height:'100%', background:bg, display:'flex', flexDirection:'column', padding:'56px 64px', position:'relative', overflow:'hidden' }}>
      {/* Subtle glow */}
      <div style={{ position:'absolute', top:-120, right:-120, width:360, height:360, borderRadius:'50%', background:`radial-gradient(circle, rgba(59,158,255,0.12) 0%, transparent 70%)`, pointerEvents:'none' }}/>

      <SlideHeader label="PM Lens" slideNum={slideNum} total={total} sub={sub} color={BLUE} />

      <h2 style={{ color:text, fontSize:40, fontWeight:700, letterSpacing:'-0.02em', marginBottom:36, lineHeight:1.1 }}>
        What this means<br/>for <span style={{color:BLUE}}>Product Managers.</span>
      </h2>

      <div style={{ flex:1, display:'flex', flexDirection:'column', gap:16 }}>
        {(data?.pmLens || ['…','…','…']).map((item, i) => (
          <div key={i} style={{ display:'flex', gap:18, alignItems:'flex-start', background:cardBg, borderRadius:12, padding:'22px 28px' }}>
            <div style={{ color:BLUE, fontSize:26, fontWeight:700, lineHeight:1, flexShrink:0, paddingTop:2 }}>→</div>
            <p style={{ color:text, fontSize:22, fontWeight:400, lineHeight:1.45, textWrap:'pretty' }}>{item}</p>
          </div>
        ))}
      </div>

      <SlideFooter sub={sub} />
    </div>
  );
}

// ─── Slide 6: CTA ─────────────────────────────────────────────────
function CtaSlide({ onLight }) {
  return (
    <div style={{ width:'100%', height:'100%', background:onLight ? CREAM : NAVY, display:'flex', flexDirection:'column', padding:'60px 64px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', bottom:-80, right:-80, width:400, height:400, borderRadius:'50%', background:onLight ? 'rgba(22,37,53,0.04)' : 'rgba(59,158,255,0.06)', pointerEvents:'none' }}/>

      <PbkLogo height={32} onLight={onLight} />

      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center' }}>
        <p style={{ color:BLUE, fontSize:18, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:16 }}>
          Stay ahead of the curve
        </p>
        <h2 style={{ color: onLight ? NAVY : '#fff', fontSize:64, fontWeight:700, lineHeight:1.05, letterSpacing:'-0.03em', marginBottom:48 }}>
          Daily AI &<br/>PM insights.
        </h2>

        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {[
            { icon:'▶', label:'YouTube', handle:'@ProductbyKel' },
            { icon:'🌐', label:'Web', handle:'kelwu.com' },
            { icon:'📸', label:'Instagram', handle:'@ProductbyKel' },
          ].map((row, i) => (
            <div key={i} style={{
              display:'flex', alignItems:'center', gap:16,
              background: onLight ? CARD_L : CARD_D,
              borderRadius:12, padding:'18px 24px'
            }}>
              <span style={{ fontSize:20 }}>{row.icon}</span>
              <span style={{ color: onLight ? 'rgba(22,37,53,0.5)' : 'rgba(255,255,255,0.4)', fontSize:14, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', width:90 }}>{row.label}</span>
              <span style={{ color: onLight ? NAVY : '#fff', fontSize:18, fontWeight:600 }}>{row.handle}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Shared sub-components ────────────────────────────────────────
function SlideHeader({ label, slideNum, total, sub, color }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:36 }}>
      <span style={{ color: color || BLUE, fontSize:13, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</span>
      <span style={{ color:sub, fontSize:13, fontWeight:400 }}>{slideNum} / {total}</span>
    </div>
  );
}
function SlideFooter({ sub }) {
  return (
    <div style={{ marginTop:24, paddingTop:20, borderTop:`1px solid ${sub}22`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <span style={{ color:sub, fontSize:14 }}>@ProductbyKel</span>
      <span style={{ color:sub, fontSize:13 }}>kelwu.com</span>
    </div>
  );
}

// ─── Loading ──────────────────────────────────────────────────────
function LoadingSlide({ onLight }) {
  return (
    <div style={{ width:'100%', height:'100%', background: onLight ? CREAM : NAVY, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28 }}>
      <PbkLogo height={32} onLight={onLight} />
      <div style={{ display:'flex', gap:10, marginTop:8 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width:10, height:10, borderRadius:'50%', background:BLUE, animation:`kpulse 1.2s ease-in-out ${i*0.2}s infinite` }}/>
        ))}
      </div>
      <p style={{ color: onLight ? 'rgba(22,37,53,0.45)' : 'rgba(255,255,255,0.4)', fontSize:16 }}>
        Fetching latest AI news…
      </p>
      <style>{`@keyframes kpulse { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-14px);opacity:1} }`}</style>
    </div>
  );
}

// ─── Main ─────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pbk_theme2')) || TWEAK_DEFAULTS.theme; } catch { return TWEAK_DEFAULTS.theme; }
  });
  const [slide, setSlide] = useState(() => {
    try { return parseInt(localStorage.getItem('pbk_slide2') || '0'); } catch { return 0; }
  });
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const touchX = useRef(null);
  const TOTAL = 6;

  const isLight = theme === 'light';

  const fetchNews = useCallback(async () => {
    setLoading(true); setSlide(0);
    try {
      const resp = await window.claude.complete({
        messages:[{ role:'user', content:`Generate a realistic AI/Product Management news story for April 22, 2026.
Return ONLY valid JSON, no markdown:
{
  "category": "2-3 word topic tag in caps, e.g. 'COMPANY STRATEGY · META'",
  "headlinePrefix": "Start of headline (2-4 words)",
  "headlineHighlight": "1-2 key words to highlight in blue",
  "headlineSuffix": "rest of headline ending with period (2-4 words)",
  "date": "April 22, 2026",
  "context": "2-3 sentences: what happened and why it matters.",
  "contextQuote": "One punchy 10-15 word pull quote summarizing the story impact.",
  "facts": ["Concise fact 1.", "Concise fact 2.", "Concise fact 3."],
  "stats": [
    {"number": "$33B", "label": "Descriptive label for this figure"},
    {"number": "500M+", "label": "Descriptive label for this figure"},
    {"number": "10×", "label": "Descriptive label for this figure"}
  ],
  "pmLens": [
    "Actionable insight for PMs (1 sentence).",
    "Actionable insight for PMs (1 sentence).",
    "Actionable insight for PMs (1 sentence)."
  ]
}`}]
      });
      const clean = resp.trim().replace(/^```json\n?/,'').replace(/\n?```$/,'');
      setData(JSON.parse(clean));
    } catch(e) {
      setData({
        category:'COMPANY STRATEGY · OPENAI',
        headlinePrefix:'OpenAI launches',
        headlineHighlight:'GPT-5',
        headlineSuffix:'and resets the bar.',
        date:'April 22, 2026',
        context:"OpenAI's GPT-5 is now live for all Plus and API users, featuring native multimodal reasoning, real-time web access, and autonomous task execution. It marks the most significant capability jump since GPT-4, with benchmarks surpassing all competing models across reasoning, code, and vision.",
        contextQuote:"GPT-5 doesn't just answer questions — it completes entire workflows.",
        facts:["GPT-5 passes the bar exam at the 99th percentile and outperforms PhD-level humans on science benchmarks.","Native computer-use lets GPT-5 autonomously operate apps, fill forms, and execute multi-step web tasks.","API pricing dropped 40% vs GPT-4 Turbo, opening enterprise adoption at scale."],
        stats:[{number:'$40B',label:'OpenAI valuation after latest funding'},{number:'99th',label:'Percentile on bar exam benchmark'},{number:'500M+',label:'ChatGPT monthly active users'}],
        pmLens:["Audit your product roadmap for any feature now automatable by GPT-5 computer-use — competitors will move fast.","Rethink your AI integration strategy: GPT-5's real-time web access makes stale RAG pipelines obsolete.","Use the 40% API price drop to justify expanding AI features you previously deprioritized on cost grounds."]
      });
    }
    setLoading(false);
  }, []);

  useEffect(() => { fetchNews(); }, []);
  useEffect(() => { localStorage.setItem('pbk_slide2', slide); }, [slide]);
  useEffect(() => { localStorage.setItem('pbk_theme2', JSON.stringify(theme)); }, [theme]);

  // Tweaks wiring
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    if (panel) panel.className = tweaksVisible ? 'visible' : '';
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.theme === theme);
      btn.onclick = () => {
        setTheme(btn.dataset.theme);
        window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ theme: btn.dataset.theme } }, '*');
      };
    });
    const rb = document.getElementById('reload-btn');
    if (rb) rb.onclick = fetchNews;
  }, [tweaksVisible, theme, fetchNews]);

  // Keyboard nav
  useEffect(() => {
    const fn = e => {
      if (e.key==='ArrowRight') setSlide(s=>Math.min(s+1,TOTAL-1));
      if (e.key==='ArrowLeft')  setSlide(s=>Math.max(s-1,0));
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, []);

  const onTouchStart = e => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (touchX.current===null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (dx < -40) setSlide(s=>Math.min(s+1,TOTAL-1));
    if (dx >  40) setSlide(s=>Math.max(s-1,0));
    touchX.current = null;
  };

  const lightTheme = theme === 'light' || (theme === 'mixed' && slide > 0 && slide < TOTAL-1);
  // mixed: cover=dark, body=light, pm lens always dark, cta=dark
  const slideLight = theme === 'light' ? true
    : theme === 'dark' ? false
    : slide === 0 ? false     // mixed: dark cover
    : slide === TOTAL-2 ? false // mixed: PM lens always dark
    : slide === TOTAL-1 ? false // mixed: dark CTA
    : true;                    // mixed: light body

  const slides = loading ? null : [
    <CoverSlide   key="c" data={data} onLight={slideLight} />,
    <ContextSlide key="x" data={data} onLight={slideLight} slideNum={2} total={TOTAL} />,
    <StatsSlide   key="s" data={data} onLight={slideLight} slideNum={3} total={TOTAL} />,
    <FactsSlide   key="f" data={data} onLight={slideLight} slideNum={4} total={TOTAL} />,
    <PmLensSlide  key="p" data={data} onLight={false}      slideNum={5} total={TOTAL} />,
    <CtaSlide     key="t" onLight={theme === 'light'} />,
  ];

  const DISPLAY = 520;
  const NATIVE  = 1080;
  const SCALE   = DISPLAY / NATIVE;

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:24 }}>
      <div style={{ color:'rgba(255,255,255,0.25)', fontSize:12, fontWeight:500, letterSpacing:'0.06em', textTransform:'uppercase' }}>
        Product by Kel · Instagram Carousel · 1080 × 1080
      </div>

      {/* Slide frame */}
      <div style={{
        width: DISPLAY, height: DISPLAY,
        position:'relative', overflow:'hidden',
        boxShadow:'0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04)',
        borderRadius:6, flexShrink:0,
      }}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div style={{ width:NATIVE, height:NATIVE, transformOrigin:'top left', transform:`scale(${SCALE})`, position:'absolute' }}>
          {loading ? <LoadingSlide onLight={theme==='light'} /> : slides[slide]}
        </div>
        {/* Nav zones */}
        {!loading && slide > 0 && <button onClick={()=>setSlide(s=>s-1)} aria-label="prev" style={{ position:'absolute',left:0,top:0,bottom:0,width:'25%',background:'transparent',border:'none',cursor:'pointer',zIndex:10 }}/>}
        {!loading && slide < TOTAL-1 && <button onClick={()=>setSlide(s=>s+1)} aria-label="next" style={{ position:'absolute',right:0,top:0,bottom:0,width:'25%',background:'transparent',border:'none',cursor:'pointer',zIndex:10 }}/>}
      </div>

      {/* Controls */}
      <div style={{ display:'flex', alignItems:'center', gap:18 }}>
        <button onClick={()=>setSlide(s=>Math.max(s-1,0))} disabled={slide===0||loading} style={{ background:'none',border:'1.5px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.6)',width:36,height:36,borderRadius:'50%',cursor:'pointer',opacity:slide===0||loading?0.3:1,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',transition:'opacity 0.2s' }}>‹</button>
        <div style={{ display:'flex', gap:6 }}>
          {Array.from({length:TOTAL}).map((_,i)=>(
            <div key={i} onClick={()=>!loading&&setSlide(i)} style={{ width:i===slide?22:7,height:7,borderRadius:100,background:i===slide?BLUE:'rgba(255,255,255,0.18)',transition:'all 0.25s',cursor:'pointer' }}/>
          ))}
        </div>
        <button onClick={()=>setSlide(s=>Math.min(s+1,TOTAL-1))} disabled={slide===TOTAL-1||loading} style={{ background:'none',border:'1.5px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.6)',width:36,height:36,borderRadius:'50%',cursor:'pointer',opacity:slide===TOTAL-1||loading?0.3:1,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',transition:'opacity 0.2s' }}>›</button>
      </div>

      {/* Theme switcher */}
      <div style={{ display:'flex', gap:6 }}>
        {['light','dark','mixed'].map(th=>(
          <button key={th} onClick={()=>setTheme(th)} style={{
            background:theme===th?'rgba(59,158,255,0.15)':'rgba(255,255,255,0.05)',
            border:`1.5px solid ${theme===th?BLUE:'transparent'}`,
            color:theme===th?BLUE:'rgba(255,255,255,0.35)',
            borderRadius:100,padding:'5px 16px',fontSize:12,fontWeight:700,
            cursor:'pointer',fontFamily:'DM Sans,sans-serif',
            textTransform:'uppercase',letterSpacing:'0.07em',transition:'all 0.2s'
          }}>{th}</button>
        ))}
        <button onClick={fetchNews} disabled={loading} style={{
          background:'rgba(59,158,255,0.1)',border:'1.5px solid rgba(59,158,255,0.3)',
          color:BLUE,borderRadius:100,padding:'5px 16px',fontSize:12,fontWeight:700,
          cursor:'pointer',fontFamily:'DM Sans,sans-serif',letterSpacing:'0.07em',
          opacity:loading?0.4:1,transition:'all 0.2s'
        }}>↻ Regenerate</button>
      </div>

      <div style={{ color:'rgba(255,255,255,0.2)', fontSize:11 }}>← → keys · click sides · swipe on mobile</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
